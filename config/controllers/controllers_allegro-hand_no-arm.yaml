    type: FollowJointTrajectory
    default: true
    joints:
      - torso_lift_joint
  head_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - head_1_joint
      - head_2_joint

